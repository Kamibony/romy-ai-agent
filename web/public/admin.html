<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROMY Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal text-gray-800">

    <!-- Navigation -->
    <nav class="bg-indigo-900 text-white shadow-md mb-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <span class="font-bold text-xl tracking-wide">ROMY Admin Panel</span>
                </div>
                <div>
                    <a href="index.html" class="text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium">Back to Home</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 pb-12">
        <section class="bg-white rounded-lg shadow-md p-6 border border-gray-200">
            <h2 class="text-2xl font-semibold mb-4 text-gray-800 border-b pb-2">Prompt Engineering</h2>
            <div id="auth-status" class="mb-4 text-sm text-gray-600">Dev Mode: Auth bypassed for MVP testing.</div>
            <div id="admin-content" style="display: block;" class="space-y-4">
                <div>
                    <label for="global-prompt" class="block text-sm font-medium text-gray-700">Global System Prompt</label>
                    <textarea id="global-prompt" rows="10" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2" placeholder="Enter instructions for the AI agent..."></textarea>
                </div>
                <div>
                    <button id="save-btn" class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                        Save Prompt
                    </button>
                    <span id="save-status" class="ml-4 text-sm text-green-600 hidden">Saved successfully!</span>
                    <span id="error-status" class="ml-4 text-sm text-red-600 hidden">Error saving prompt.</span>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBF2KBDgfYOzMbdSjFgCrGUygQbFaSfSxI",
            authDomain: "romy-ai-agent.firebaseapp.com",
            projectId: "romy-ai-agent"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const authStatus = document.getElementById('auth-status');
        const adminContent = document.getElementById('admin-content');
        const globalPromptInput = document.getElementById('global-prompt');
        const saveBtn = document.getElementById('save-btn');
        const saveStatus = document.getElementById('save-status');
        const errorStatus = document.getElementById('error-status');

        // Load existing prompt immediately on page load
        (async () => {
            try {
                const docRef = doc(db, "settings", "global_prompt");
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    globalPromptInput.value = docSnap.data().prompt || "";
                }
            } catch (error) {
                console.error("Error loading prompt:", error);
                errorStatus.textContent = "Error loading prompt: " + error.message;
                errorStatus.classList.remove('hidden');
            }
        })();

        saveBtn.addEventListener('click', async () => {
            const promptText = globalPromptInput.value;
            saveBtn.disabled = true;
            saveBtn.textContent = 'Saving...';
            saveStatus.classList.add('hidden');
            errorStatus.classList.add('hidden');

            try {
                await setDoc(doc(db, "settings", "global_prompt"), {
                    prompt: promptText,
                    updatedAt: new Date()
                });
                saveStatus.classList.remove('hidden');
                setTimeout(() => saveStatus.classList.add('hidden'), 3000);
            } catch (error) {
                console.error("Error saving prompt:", error);
                errorStatus.textContent = "Error saving prompt: " + error.message;
                errorStatus.classList.remove('hidden');
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = 'Save Prompt';
            }
        });
    </script>
</body>
</html>
