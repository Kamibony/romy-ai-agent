<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROMY Mobile Trigger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Mobile-first specific adjustments */
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal text-gray-800 flex flex-col min-h-screen">

    <!-- Header -->
    <header class="bg-indigo-900 text-white shadow-md p-4 sticky top-0 z-10">
        <div class="flex items-center justify-between">
            <span class="font-bold text-xl tracking-wide">ROMY Mobile Trigger</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col justify-center p-4">
        <div class="bg-white rounded-xl shadow-lg p-6 space-y-6 w-full max-w-md mx-auto">
            <h2 class="text-2xl font-semibold text-center text-gray-800">Remote Command</h2>
            <p class="text-center text-gray-500 text-sm">Enter a command to execute on your machine.</p>

            <div id="auth-status" class="text-center text-sm text-gray-600">Checking auth...</div>
            <div id="status-message" class="text-center text-sm mt-2 font-medium">Ready to assist</div>

            <div id="login-container" style="display: none;" class="space-y-4">
                <input type="email" id="login-email" placeholder="Email" class="block w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-lg border p-3" />
                <input type="password" id="login-password" placeholder="Password" class="block w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-lg border p-3" />
                <button id="btn-login" class="w-full py-3 px-4 border border-transparent rounded-lg shadow-sm text-lg font-bold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-150 ease-in-out">
                    Login
                </button>
                <div id="login-error" class="text-center text-sm text-red-600 mt-2 hidden"></div>
            </div>

            <div id="command-content" style="display: none;" class="space-y-6">
                <!-- Voice Capture -->
                <div class="flex justify-center">
                    <button id="btn-record" class="flex justify-center items-center rounded-full w-20 h-20 bg-indigo-600 hover:bg-indigo-700 text-white shadow-lg focus:outline-none transition-colors duration-200" aria-label="Toggle Recording">
                        <svg id="icon-mic" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                        <svg id="icon-stop" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
                    </button>
                </div>

                <div class="space-y-2">
                    <label for="command-input" class="sr-only">Command</label>
                    <textarea id="command-input" rows="2" class="block w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-lg border p-3 resize-none" placeholder="Or type a command..."></textarea>
                </div>

                <div class="flex space-x-4">
                    <button id="execute-btn" class="flex-1 py-3 px-4 border border-transparent rounded-lg shadow-sm text-lg font-bold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-150 ease-in-out">
                        Submit
                    </button>
                    <button id="btn-logout" class="py-3 px-4 border border-transparent rounded-lg shadow-sm text-lg font-bold text-white bg-red-500 hover:bg-red-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition duration-150 ease-in-out">
                        Logout
                    </button>
                </div>
            </div>

            <div id="hitl-section" style="display: none;" class="mt-8 border-t pt-6 space-y-4">
                <h3 class="text-xl font-semibold text-center text-orange-600">Agent Needs Help</h3>
                <p id="hitl-reason" class="text-center text-gray-700 font-medium"></p>
                <img id="hitl-screenshot" class="w-full rounded shadow-md border" alt="Agent Screenshot" />
                <div class="space-y-2">
                    <label for="hitl-input" class="sr-only">Instruction</label>
                    <textarea id="hitl-input" rows="3" class="block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-base border p-3 resize-none" placeholder="Provide instructions to the agent..."></textarea>
                </div>
                <button id="resume-btn" class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-lg font-bold text-white bg-orange-600 hover:bg-orange-700 active:bg-orange-800 focus:outline-none transition duration-150 ease-in-out">
                    Resume Task
                </button>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, where, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBF2KBDgfYOzMbdSjFgCrGUygQbFaSfSxI",
            authDomain: "romy-ai-agent.firebaseapp.com",
            projectId: "romy-ai-agent"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        import { signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const authStatus = document.getElementById('auth-status');
        const commandContent = document.getElementById('command-content');
        const commandInput = document.getElementById('command-input');
        const executeBtn = document.getElementById('execute-btn');
        const statusMessage = document.getElementById('status-message');

        const loginContainer = document.getElementById('login-container');
        const btnLogin = document.getElementById('btn-login');
        const btnLogout = document.getElementById('btn-logout');
        const loginEmail = document.getElementById('login-email');
        const loginPassword = document.getElementById('login-password');
        const loginError = document.getElementById('login-error');

        const btnRecord = document.getElementById('btn-record');
        const iconMic = document.getElementById('icon-mic');
        const iconStop = document.getElementById('icon-stop');

        const hitlSection = document.getElementById('hitl-section');
        const hitlReason = document.getElementById('hitl-reason');
        const hitlScreenshot = document.getElementById('hitl-screenshot');
        const hitlInput = document.getElementById('hitl-input');
        const resumeBtn = document.getElementById('resume-btn');

        let currentUser = null;
        let activeHelpTaskId = null;
        let isRecording = false;
        let mediaRecorder = null;
        let audioChunks = [];

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                authStatus.textContent = `Signed in as ${user.email}`;
                loginContainer.style.display = 'none';
                commandContent.style.display = 'block';
                statusMessage.textContent = 'Ready to assist';
            } else {
                currentUser = null;
                authStatus.textContent = 'Not signed in.';
                loginContainer.style.display = 'block';
                commandContent.style.display = 'none';
                statusMessage.textContent = 'Please log in';
            }
        });

        btnLogin.addEventListener('click', async () => {
            const email = loginEmail.value.trim();
            const password = loginPassword.value;
            if (!email || !password) {
                loginError.textContent = "Please enter email and password.";
                loginError.classList.remove('hidden');
                return;
            }

            btnLogin.disabled = true;
            btnLogin.textContent = "Logging in...";
            loginError.classList.add('hidden');

            try {
                await signInWithEmailAndPassword(auth, email, password);
                loginEmail.value = '';
                loginPassword.value = '';
            } catch (error) {
                loginError.textContent = error.message || "Login failed.";
                loginError.classList.remove('hidden');
            } finally {
                btnLogin.disabled = false;
                btnLogin.textContent = "Login";
            }
        });

        btnLogout.addEventListener('click', async () => {
            await signOut(auth);
        });

        btnRecord.addEventListener('click', async () => {
            if (!isRecording) {
                await startRecording();
            } else {
                await stopRecordingAndSend();
            }
        });

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = event => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };

                mediaRecorder.start();
                isRecording = true;

                // Update UI
                btnRecord.classList.remove('bg-indigo-600', 'hover:bg-indigo-700');
                btnRecord.classList.add('bg-red-600', 'hover:bg-red-700', 'animate-pulse');
                iconMic.classList.add('hidden');
                iconStop.classList.remove('hidden');
                statusMessage.textContent = "Listening...";
            } catch (err) {
                console.error("Microphone error:", err);
                statusMessage.textContent = "Microphone error. Check permissions.";
                statusMessage.className = 'text-center text-sm mt-2 font-medium text-red-600';
            }
        }

        async function stopRecordingAndSend() {
            if (isRecording && mediaRecorder) {
                isRecording = false;

                // Update UI
                btnRecord.classList.add('bg-indigo-600', 'hover:bg-indigo-700');
                btnRecord.classList.remove('bg-red-600', 'hover:bg-red-700', 'animate-pulse');
                iconStop.classList.add('hidden');
                iconMic.classList.remove('hidden');
                statusMessage.textContent = "Processing...";

                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });

                    // Stop tracks to release microphone
                    mediaRecorder.stream.getTracks().forEach(track => track.stop());

                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = async () => {
                        const base64Audio = reader.result.split(',')[1];
                        if (base64Audio) {
                            await sendCommand("", base64Audio);
                        } else {
                            statusMessage.textContent = "No audio captured.";
                        }
                    };
                };

                mediaRecorder.stop();
            }
        }

        // Listen for help needed tasks
        const q = query(collection(db, "remote_commands"), where("status", "==", "help_needed"));
        onSnapshot(q, (snapshot) => {
            if (!snapshot.empty) {
                // For simplicity, just take the first one
                const docSnap = snapshot.docs[0];
                const data = docSnap.data();
                activeHelpTaskId = docSnap.id;

                hitlReason.textContent = data.help_reason || "No reason provided.";
                if (data.screenshot_b64) {
                    hitlScreenshot.src = `data:image/png;base64,${data.screenshot_b64}`;
                    hitlScreenshot.style.display = 'block';
                } else {
                    hitlScreenshot.style.display = 'none';
                }

                hitlInput.value = '';
                hitlSection.style.display = 'block';
            } else {
                hitlSection.style.display = 'none';
                activeHelpTaskId = null;
            }
        });

        resumeBtn.addEventListener('click', async () => {
            if (!activeHelpTaskId) return;

            const instruction = hitlInput.value.trim();
            if (!instruction) {
                alert("Please provide an instruction before resuming.");
                return;
            }

            resumeBtn.disabled = true;
            resumeBtn.textContent = 'Resuming...';

            try {
                const taskRef = doc(db, "remote_commands", activeHelpTaskId);
                await updateDoc(taskRef, {
                    human_response: instruction,
                    status: 'in_progress'
                });
                console.log("Task resumed.");
            } catch (error) {
                console.error("Error resuming task:", error);
                alert("Failed to resume task.");
            } finally {
                resumeBtn.disabled = false;
                resumeBtn.textContent = 'Resume Task';
            }
        });


        executeBtn.addEventListener('click', async () => {
            const commandText = commandInput.value.trim();
            if (!commandText) {
                statusMessage.textContent = 'Please enter a command.';
                statusMessage.className = 'text-center text-sm mt-2 font-medium text-red-600 block';
                return;
            }
            await sendCommand(commandText, "");
        });

        async function sendCommand(commandText, audioB64) {
            executeBtn.disabled = true;
            btnRecord.disabled = true;
            statusMessage.textContent = 'Sending...';
            statusMessage.className = 'text-center text-sm mt-2 font-medium text-gray-600 block';

            try {
                if (!currentUser) {
                    throw new Error("Must be logged in to send a command.");
                }

                const payload = {
                    status: 'pending',
                    timestamp: serverTimestamp(),
                    uid: currentUser.uid
                };

                if (commandText) payload.command = commandText;
                if (audioB64) payload.audio_b64 = audioB64;

                const docRef = await addDoc(collection(db, "remote_commands"), payload);
                console.log("Document written with ID: ", docRef.id);

                statusMessage.textContent = 'Command sent successfully!';
                statusMessage.className = 'text-center text-sm mt-2 font-medium text-green-600 block font-bold';
                commandInput.value = ''; // Clear input on success

                setTimeout(() => {
                    statusMessage.textContent = 'Ready to assist';
                    statusMessage.className = 'text-center text-sm mt-2 font-medium text-gray-800 block';
                }, 3000);
            } catch (error) {
                console.error("Error adding document: ", error);
                statusMessage.textContent = 'Failed to send command: ' + error.message;
                statusMessage.className = 'text-center text-sm mt-2 font-medium text-red-600 block';
            } finally {
                executeBtn.disabled = false;
                btnRecord.disabled = false;
            }
        }
    </script>
</body>
</html>
