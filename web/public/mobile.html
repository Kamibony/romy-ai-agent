<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROMY Mobile Trigger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Mobile-first specific adjustments */
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal text-gray-800 flex flex-col min-h-screen">

    <!-- Header -->
    <header class="bg-indigo-900 text-white shadow-md p-4 sticky top-0 z-10">
        <div class="flex items-center justify-between">
            <span class="font-bold text-xl tracking-wide">ROMY Mobile Trigger</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col justify-center p-4">
        <div class="bg-white rounded-xl shadow-lg p-6 space-y-6 w-full max-w-md mx-auto">
            <h2 class="text-2xl font-semibold text-center text-gray-800">Remote Command</h2>
            <p class="text-center text-gray-500 text-sm">Enter a command to execute on your machine.</p>

            <div id="auth-status" class="text-center text-sm text-gray-600">Checking auth...</div>

            <div id="command-content" style="display: none;" class="space-y-4">
                <div class="space-y-2">
                    <label for="command-input" class="sr-only">Command</label>
                    <textarea id="command-input" rows="4" class="block w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-lg border p-3 resize-none" placeholder="e.g., 'Add a property', 'Approve the latest request'"></textarea>
                </div>

                <button id="execute-btn" class="w-full flex justify-center items-center py-4 px-4 border border-transparent rounded-lg shadow-sm text-lg font-bold text-white bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-150 ease-in-out">
                    <svg class="mr-2 h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    Execute Remote Command
                </button>
                <div id="status-message" class="text-center text-sm mt-2 hidden"></div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBF2KBDgfYOzMbdSjFgCrGUygQbFaSfSxI",
            authDomain: "romy-ai-agent.firebaseapp.com",
            projectId: "romy-ai-agent"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const authStatus = document.getElementById('auth-status');
        const commandContent = document.getElementById('command-content');
        const commandInput = document.getElementById('command-input');
        const executeBtn = document.getElementById('execute-btn');
        const statusMessage = document.getElementById('status-message');

        let currentUser = null;

        // Dev Mode Bypass
        authStatus.textContent = `Dev Mode (No Auth Required)`;
        commandContent.style.display = 'block';

        /*
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                authStatus.textContent = `Signed in as ${user.email}`;
                commandContent.style.display = 'block';
            } else {
                currentUser = null;
                authStatus.innerHTML = '<span class="text-red-600">Not signed in. Please <a href="sandbox.html" class="underline text-indigo-600">sign in here</a> first.</span>';
                commandContent.style.display = 'none';
            }
        });
        */

        executeBtn.addEventListener('click', async () => {
            const commandText = commandInput.value.trim();
            if (!commandText) {
                statusMessage.textContent = 'Please enter a command.';
                statusMessage.className = 'text-center text-sm mt-2 text-red-600 block';
                return;
            }

            executeBtn.disabled = true;
            executeBtn.innerHTML = '<svg class="animate-spin mr-2 h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Sending...';
            statusMessage.classList.add('hidden');

            try {
                const docRef = await addDoc(collection(db, "remote_commands"), {
                    command: commandText,
                    status: 'pending',
                    timestamp: serverTimestamp(),
                    uid: currentUser ? currentUser.uid : 'dev-user-id'
                });
                console.log("Document written with ID: ", docRef.id);

                statusMessage.textContent = 'Command sent successfully!';
                statusMessage.className = 'text-center text-sm mt-2 text-green-600 block font-bold';
                commandInput.value = ''; // Clear input on success

                setTimeout(() => {
                    statusMessage.classList.add('hidden');
                }, 3000);
            } catch (error) {
                console.error("Error adding document: ", error);
                statusMessage.textContent = 'Failed to send command: ' + error.message;
                statusMessage.className = 'text-center text-sm mt-2 text-red-600 block';
            } finally {
                executeBtn.disabled = false;
                executeBtn.innerHTML = '<svg class="mr-2 h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg> Execute Remote Command';
            }
        });
    </script>
</body>
</html>
