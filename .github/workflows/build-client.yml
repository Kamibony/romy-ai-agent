name: Build Client

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'client/**'
      - '.github/workflows/build-client.yml'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r client/requirements.txt
          pip install pyinstaller

      - name: Download Splash Screen Image
        working-directory: ./client
        run: curl -o splash.png "https://dummyimage.com/600x300/0f172a/ffffff.png&text=ROMY+AI+Agent+-+Loading..."

      - name: Build Executable
        working-directory: ./client
        run: pyinstaller --noconfirm --onefile --windowed --splash splash.png --hidden-import plyer.platforms.win.notification --collect-all playwright_stealth main.py

      - name: Rename Executable
        working-directory: ./client/dist
        run: Rename-Item -Path "main.exe" -NewName "ROMY-Agent-MVP.exe"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Release
          files: client/dist/ROMY-Agent-MVP.exe
          make_latest: true
