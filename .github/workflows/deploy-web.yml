name: Deploy Web to Firebase Hosting

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/deploy-web.yml'

jobs:
  deploy-hosting:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/1049976869239/locations/global/workloadIdentityPools/github-pool-v2/providers/github-provider-v2'
          service_account: 'github-actions@romy-ai-agent.iam.gserviceaccount.com'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --project romy-ai-agent
